# This workflow is a FALLBACK for CI-based releases.
# The canonical release process is: ./Scripts/release.sh
# (Signs using your local Keychain — no GitHub secret needed.)
#
# Only run this manually if you cannot use release.sh.
# Requires the SPARKLE_PRIVATE_KEY secret to be set in repo settings.

name: Release (manual fallback)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.22)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Stamp version into Xcode project
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PBXPROJ="BusKit.xcodeproj/project.pbxproj"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BUILD=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))

          CURRENT_MV=$(grep 'MARKETING_VERSION' "$PBXPROJ" | head -1 \
            | sed 's/.*MARKETING_VERSION = //;s/;//' | xargs)
          ESCAPED_MV="${CURRENT_MV//./\\.}"
          sed -i '' "s/MARKETING_VERSION = ${ESCAPED_MV};/MARKETING_VERSION = ${VERSION};/g" "$PBXPROJ"

          CURRENT_CPV=$(grep 'CURRENT_PROJECT_VERSION' "$PBXPROJ" | head -1 \
            | sed 's/.*CURRENT_PROJECT_VERSION = //;s/;//' | xargs)
          sed -i '' "s/CURRENT_PROJECT_VERSION = ${CURRENT_CPV};/CURRENT_PROJECT_VERSION = ${BUILD};/g" "$PBXPROJ"

          echo "✅ MARKETING_VERSION=$VERSION  CURRENT_PROJECT_VERSION=$BUILD"

      - name: Build DMG
        run: |
          VERSION="${{ github.event.inputs.version }}"
          ./Scripts/package.sh \
            --arch arm64 \
            --output "BusKit-${VERSION}-arm64.dmg"

      - name: Create GitHub Release
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG="v${VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BusKit.xcodeproj/project.pbxproj
          git commit -m "chore: stamp version $VERSION for manual release [skip ci]" || true
          git tag "$TAG"
          git push origin HEAD:main "$TAG"
          gh release create "$TAG" "BusKit-${VERSION}-arm64.dmg" \
            --title "BusKit v${VERSION}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign and update appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG="v${VERSION}"
          DMG="BusKit-${VERSION}-arm64.dmg"

          if [[ -z "$SPARKLE_PRIVATE_KEY" ]]; then
            echo "❌ SPARKLE_PRIVATE_KEY secret is not set" >&2
            exit 1
          fi

          SPARKLE_VERSION="2.9.3"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o sparkle.tar.xz
          mkdir sparkle-tools && tar xf sparkle.tar.xz -C sparkle-tools

          # Sign the DMG directly
          SIGN_OUT=$(printf '%s' "$SPARKLE_PRIVATE_KEY" \
            | sparkle-tools/bin/sign_update "$DMG" --ed-key-file -)
          ED_SIG=$(echo "$SIGN_OUT" | grep -o 'sparkle:edSignature="[^"]*"' \
            | sed 's/sparkle:edSignature="//;s/"//')
          DMG_LEN=$(stat -f%z "$DMG")
          PUBDATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          BUILD=$(grep 'CURRENT_PROJECT_VERSION' BusKit.xcodeproj/project.pbxproj \
            | head -1 | sed 's/.*CURRENT_PROJECT_VERSION = //;s/;//' | xargs)
          URL="https://github.com/middleway-group/BusKit/releases/download/${TAG}/BusKit-${VERSION}-arm64.dmg"

          if [[ -z "$ED_SIG" ]]; then
            echo "❌ Signing failed — edSignature is empty" >&2
            exit 1
          fi
          echo "✅ Signed: ${ED_SIG:0:20}…"

          APPCAST_PATH="releases/appcast.xml" \
          VERSION="$VERSION" \
          BUILD="$BUILD" \
          PUBDATE="$PUBDATE" \
          DOWNLOAD_URL="$URL" \
          ED_SIG="$ED_SIG" \
          DMG_LEN="$DMG_LEN" \
          python3 Scripts/update_appcast.py

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/appcast.xml
          git commit -m "chore: update appcast for $VERSION [skip ci]"
          git push origin HEAD:main
          echo "✅ appcast published"
